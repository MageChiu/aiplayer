name: Release Build

on:
  push:
    tags:
      - 'release-*' # Trigger on tags starting with 'v', e.g., v1.0.0

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (macOS)
        run: |
          brew install cmake ninja pkg-config
          brew install mpv
          brew install ffmpeg

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.2'
          host: 'mac'
          target: 'desktop'

      - name: Build macOS App
        run: |
          chmod +x scripts/build_macos.sh
          ./scripts/build_macos.sh --release

      - name: Archive macOS Build
        run: |
          cd dist/macos
          # 假设 build_macos.sh 把 app 放到了 dist/macos/AIPlayer.app
          # 如果有 .dmg 最好，这里打包成 zip 方便上传
          zip -r AIPlayer-macOS.zip AIPlayer.app
          cd ../..

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-macOS
          path: dist/macos/AIPlayer-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup vcpkg and install mpv
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install mpv:x64-windows pkgconf:x64-windows

      - name: Build Windows Exe
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: |
          .\scripts\build_windows.ps1 --release

      - name: Package Windows Build
        run: |
          # 假设 build_windows.ps1 把 aiplayer.exe 放在了 dist/windows/aiplayer.exe
          # 在 Windows 下，我们还需要打包 mpv 的 dll 和 Qt 的 dll。
          # 简单的做法：先用 windeployqt 抓取 Qt 依赖
          $windeployqt = (Get-Command windeployqt.exe).Source
          & $windeployqt dist\windows\aiplayer.exe
          
          # 复制 mpv 的 dll
          Copy-Item .\vcpkg\installed\x64-windows\bin\mpv-2.dll dist\windows\ -Force
          
          # 打包成 zip
          Compress-Archive -Path dist\windows\* -DestinationPath dist\windows\AIPlayer-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-Windows
          path: dist\windows\AIPlayer-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: AIPlayer-macOS
          path: artifacts/macos

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: AIPlayer-Windows
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/macos/AIPlayer-macOS.zip
            artifacts/windows/AIPlayer-Windows.zip
          generate_release_notes: true
          draft: false
          prerelease: false
