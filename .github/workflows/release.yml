name: Release Build

on:
  push:
    tags:
      - 'release-*' # Trigger on tags starting with 'v', e.g., v1.0.0

jobs:
  build-macos-intel:
    runs-on: macos-15-intel
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (macOS)
        run: |
          brew install cmake ninja pkg-config
          brew install mpv
          brew install ffmpeg
          brew install libtorrent-rasterbar

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'

      - name: Build macOS App
        run: |
          chmod +x scripts/build_macos.sh
          ./scripts/build_macos.sh --release

      - name: Archive macOS Build
        run: |
          cd dist/macos
          zip -r AIPlayer-macOS-x86_64.zip aiplayer.app
          cd ../..

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-macOS-x86_64
          path: dist/macos/AIPlayer-macOS-x86_64.zip

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (macOS)
        run: |
          brew install cmake ninja pkg-config
          brew install mpv
          brew install ffmpeg
          brew install libtorrent-rasterbar

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'

      - name: Build macOS App
        run: |
          chmod +x scripts/build_macos.sh
          ./scripts/build_macos.sh --release

      - name: Archive macOS Build
        run: |
          cd dist/macos
          zip -r AIPlayer-macOS-arm64.zip aiplayer.app
          cd ../..

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-macOS-arm64
          path: dist/macos/AIPlayer-macOS-arm64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup vcpkg dependencies
        run: |
          git clone https://github.com/microsoft/vcpkg.git "${{ github.workspace }}\vcpkg"
          & "${{ github.workspace }}\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          & "${{ github.workspace }}\vcpkg\vcpkg.exe" install ffmpeg:x64-windows libtorrent:x64-windows

      - name: Download and detect libmpv
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match '^mpv-dev-x86_64-.*\.7z$' } | Select-Object -First 1
          if (-not $asset) {
            throw "Cannot find mpv-dev-x86_64 asset in latest release."
          }
          Write-Host "Using mpv asset: $($asset.name)"
          $mpvRoot = Join-Path "${{ github.workspace }}" "mpv-dev"
          New-Item -ItemType Directory -Force -Path $mpvRoot | Out-Null
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile (Join-Path "${{ github.workspace }}" "mpv-dev.7z")
          7z x (Join-Path "${{ github.workspace }}" "mpv-dev.7z") "-o$mpvRoot" -y

          Write-Host "Extracted mpv-dev tree:"
          Get-ChildItem -Path $mpvRoot -Recurse | Select-Object FullName

          $clientHeader = Get-ChildItem -Path $mpvRoot -Recurse -File -Filter "client.h" |
            Where-Object { $_.FullName -match '[\\/]mpv[\\/]client\.h$' } |
            Select-Object -First 1
          if (-not $clientHeader) {
            throw "mpv/client.h was not found after extracting mpv-dev archive."
          }

          $includeDir = Split-Path (Split-Path $clientHeader.FullName -Parent) -Parent
          $libFile = Get-ChildItem -Path $mpvRoot -Recurse -File -Include *.lib |
            Where-Object { $_.Name -match '^(mpv|libmpv|mpv-2|libmpv-2)\.lib$' } |
            Select-Object -First 1
          $dllFile = Get-ChildItem -Path $mpvRoot -Recurse -File |
            Where-Object { $_.Name -match '^(mpv-2|libmpv-2)\.dll$' } |
            Select-Object -First 1

          if (-not $libFile -and $dllFile) {
            $dllName = $dllFile.Name
            $defPath = Join-Path $mpvRoot "$([System.IO.Path]::GetFileNameWithoutExtension($dllName)).def"
            $exports = & dumpbin.exe /exports $dllFile.FullName
            "LIBRARY $dllName" | Set-Content -Path $defPath -Encoding ascii
            "EXPORTS" | Add-Content -Path $defPath -Encoding ascii
            foreach ($line in $exports) {
              if ($line -match '^\s+\d+\s+[0-9A-F]+\s+[0-9A-F]+\s+([A-Za-z0-9_@?$.]+)$') {
                Add-Content -Path $defPath -Value $matches[1] -Encoding ascii
              }
            }

            $generatedLib = Join-Path $mpvRoot "mpv.lib"
            & lib.exe "/def:$defPath" "/name:$dllName" "/out:$generatedLib" "/machine:x64"
            $libFile = Get-Item $generatedLib
          }

          if (-not $libFile) {
            throw "Neither mpv import library nor mpv/libmpv dll was found after extracting mpv-dev archive."
          }
          if (-not $dllFile) {
            throw "Neither mpv-2.dll nor libmpv-2.dll was found after extracting mpv-dev archive."
          }

          "MPV_DEV_ROOT=$mpvRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MPV_INCLUDE_DIR=$includeDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MPV_LIBRARY=$($libFile.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MPV_DLL_PATH=$($dllFile.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "Resolved MPV include: $includeDir"
          Write-Host "Resolved MPV library: $($libFile.FullName)"
          Write-Host "Resolved MPV dll: $($dllFile.FullName)"

      - name: Build Windows Exe
        env:
          CMAKE_PREFIX_PATH: ${{ env.MPV_DEV_ROOT }}
          MPV_INCLUDE_DIR: ${{ env.MPV_INCLUDE_DIR }}
          MPV_LIBRARY: ${{ env.MPV_LIBRARY }}
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: |
          .\scripts\build_windows.ps1 --release

      - name: Package Windows Build
        run: |
          $windeployqt = (Get-Command windeployqt.exe).Source
          & $windeployqt dist\windows\aiplayer.exe
          
          if (-not (Test-Path $env:MPV_DLL_PATH)) {
            throw "Resolved MPV_DLL_PATH does not exist: $env:MPV_DLL_PATH"
          }
          Copy-Item $env:MPV_DLL_PATH dist\windows\ -Force

          $vcpkgBin = "${{ github.workspace }}\vcpkg\installed\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem $vcpkgBin -Filter "*.dll" | ForEach-Object {
              Copy-Item $_.FullName dist\windows\ -Force
            }
          }
          
          # 打包成 zip
          Compress-Archive -Path dist\windows\* -DestinationPath dist\windows\AIPlayer-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-Windows
          path: dist\windows\AIPlayer-Windows.zip

  release:
    needs: [build-macos-intel, build-macos-arm64, build-windows]
    if: always() && (needs.build-macos-intel.result == 'success' || needs.build-macos-arm64.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS Intel Artifact
        uses: actions/download-artifact@v4
        if: needs.build-macos-intel.result == 'success'
        continue-on-error: true
        with:
          name: AIPlayer-macOS-x86_64
          path: artifacts/macos-intel

      - name: Download macOS Apple Silicon Artifact
        uses: actions/download-artifact@v4
        if: needs.build-macos-arm64.result == 'success'
        continue-on-error: true
        with:
          name: AIPlayer-macOS-arm64
          path: artifacts/macos-arm64

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        if: needs.build-windows.result == 'success'
        continue-on-error: true
        with:
          name: AIPlayer-Windows
          path: artifacts/windows

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*.zip
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
