name: Release Build

on:
  push:
    tags:
      - 'release-*' # Trigger on tags starting with 'v', e.g., v1.0.0

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (macOS)
        run: |
          brew install cmake ninja pkg-config
          brew install mpv
          brew install ffmpeg

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.2'
          host: 'mac'
          target: 'desktop'

      - name: Build macOS App
        run: |
          chmod +x scripts/build_macos.sh
          ./scripts/build_macos.sh --release

      - name: Archive macOS Build
        run: |
          cd dist/macos
          # 假设 build_macos.sh 把 app 放到了 dist/macos/AIPlayer.app
          # 如果有 .dmg 最好，这里打包成 zip 方便上传
          zip -r AIPlayer-macOS.zip AIPlayer.app
          cd ../..

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-macOS
          path: dist/macos/AIPlayer-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Download and setup libmpv
        run: |
          Invoke-WebRequest -Uri "https://sourceforge.net/projects/mpv-player-windows/files/libmpv/mpv-dev-x86_64-20231210-git-32fcb94.7z/download" -OutFile mpv-dev.7z
          7z x mpv-dev.7z -o${{ github.workspace }}\mpv-dev
          cd ${{ github.workspace }}\mpv-dev
          # Generate MSVC import library from def file
          cmd /c "call `"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat`" && lib /def:mpv.def /name:mpv-2.dll /out:mpv.lib /MACHINE:X64"

      - name: Build Windows Exe
        env:
          CMAKE_PREFIX_PATH: ${{ github.workspace }}\mpv-dev
        run: |
          .\scripts\build_windows.ps1 --release

      - name: Package Windows Build
        run: |
          $windeployqt = (Get-Command windeployqt.exe).Source
          & $windeployqt dist\windows\aiplayer.exe
          
          # 复制 mpv 的 dll
          Copy-Item ${{ github.workspace }}\mpv-dev\mpv-2.dll dist\windows\ -Force
          
          # 打包成 zip
          Compress-Archive -Path dist\windows\* -DestinationPath dist\windows\AIPlayer-Windows.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-Windows
          path: dist\windows\AIPlayer-Windows.zip

  release:
    needs: [build-macos, build-windows]
    if: always() && (needs.build-macos.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        if: needs.build-macos.result == 'success'
        with:
          name: AIPlayer-macOS
          path: artifacts/macos

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        if: needs.build-windows.result == 'success'
        with:
          name: AIPlayer-Windows
          path: artifacts/windows

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*.zip
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
