  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup vcpkg dependencies
        run: |
          git clone https://github.com/microsoft/vcpkg.git "${{ github.workspace }}\vcpkg"
          & "${{ github.workspace }}\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          Remove-Item Env:VCPKG_ROOT -ErrorAction SilentlyContinue
          & "${{ github.workspace }}\vcpkg\vcpkg.exe" install `
            --triplet x64-windows `
            --x-manifest-root="${{ github.workspace }}" `
            --vcpkg-root="${{ github.workspace }}\vcpkg"

      - name: Download and detect libmpv
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match '^mpv-dev-x86_64-.*\.7z$' } | Select-Object -First 1
          if (-not $asset) {
            throw "Cannot find mpv-dev-x86_64 asset in latest release."
          }
          Write-Host "Using mpv asset: $($asset.name)"
          $mpvRoot = Join-Path "${{ github.workspace }}" ".deps\mpv"
          New-Item -ItemType Directory -Force -Path $mpvRoot | Out-Null
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile (Join-Path "${{ github.workspace }}" "mpv-dev.7z")
          7z x (Join-Path "${{ github.workspace }}" "mpv-dev.7z") "-o$mpvRoot" -y

          $clientHeader = Get-ChildItem -Path $mpvRoot -Recurse -File -Filter "client.h" |
            Where-Object { $_.FullName -match '[\\/]mpv[\\/]client\.h$' } |
            Select-Object -First 1
          if (-not $clientHeader) {
            throw "mpv/client.h was not found after extracting mpv-dev archive."
          }

          $includeDir = Split-Path (Split-Path $clientHeader.FullName -Parent) -Parent
          $libFile = Get-ChildItem -Path $mpvRoot -Recurse -File -Include *.lib |
            Where-Object { $_.Name -match '^(mpv|libmpv|mpv-2|libmpv-2)\.lib$' } |
            Select-Object -First 1
          $dllFile = Get-ChildItem -Path $mpvRoot -Recurse -File |
            Where-Object { $_.Name -match '^(mpv-2|libmpv-2)\.dll$' } |
            Select-Object -First 1

          if (-not $libFile -and $dllFile) {
            $dllName = $dllFile.Name
            $defPath = Join-Path $mpvRoot "$([System.IO.Path]::GetFileNameWithoutExtension($dllName)).def"
            $exports = & dumpbin.exe /exports $dllFile.FullName
            "LIBRARY $dllName" | Set-Content -Path $defPath -Encoding ascii
            "EXPORTS" | Add-Content -Path $defPath -Encoding ascii
            foreach ($line in $exports) {
              if ($line -match '^\s+\d+\s+[0-9A-F]+\s+[0-9A-F]+\s+([A-Za-z0-9_@?$.]+)$') {
                Add-Content -Path $defPath -Value $matches[1] -Encoding ascii
              }
            }
            $generatedLib = Join-Path $mpvRoot "mpv.lib"
            & lib.exe "/def:$defPath" "/name:$dllName" "/out:$generatedLib" "/machine:x64"
            $libFile = Get-Item $generatedLib
          }

          if (-not $libFile) { throw "No mpv import library found." }
          if (-not $dllFile) { throw "No mpv runtime dll found." }

          "MPV_ROOT=$mpvRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MPV_INCLUDE_DIR=$includeDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MPV_LIBRARY=$($libFile.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "MPV_DLL_PATH=$($dllFile.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Windows Exe
        env:
          MPV_ROOT: ${{ env.MPV_ROOT }}
          MPV_INCLUDE_DIR: ${{ env.MPV_INCLUDE_DIR }}
          MPV_LIBRARY: ${{ env.MPV_LIBRARY }}
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
        run: |
          .\scripts\build_windows.ps1 --release

      - name: Diagnose Windows bundle inputs
        if: always()
        run: |
          Write-Host "== .deps tree =="
          Get-ChildItem .deps -Recurse -File | Select-Object FullName
          Write-Host "== vcpkg_installed bin =="
          Get-ChildItem "${{ github.workspace }}\vcpkg_installed\x64-windows\bin" -File -ErrorAction SilentlyContinue | Select-Object Name
          Write-Host "== resolved MPV =="
          Write-Host "MPV_ROOT=$env:MPV_ROOT"
          Write-Host "MPV_INCLUDE_DIR=$env:MPV_INCLUDE_DIR"
          Write-Host "MPV_LIBRARY=$env:MPV_LIBRARY"
          Write-Host "MPV_DLL_PATH=$env:MPV_DLL_PATH"

      - name: Package Windows Build
        if: success()
        run: |
          $windeployqt = (Get-Command windeployqt.exe).Source
          & $windeployqt dist\windows\aiplayer.exe

          if (-not (Test-Path $env:MPV_DLL_PATH)) {
            throw "Resolved MPV_DLL_PATH does not exist: $env:MPV_DLL_PATH"
          }
          Copy-Item $env:MPV_DLL_PATH dist\windows\ -Force

          $vcpkgBin = "${{ github.workspace }}\vcpkg_installed\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem $vcpkgBin -Filter "*.dll" | ForEach-Object {
              Copy-Item $_.FullName dist\windows\ -Force
            }
          }

          Compress-Archive -Path dist\windows\* -DestinationPath dist\windows\AIPlayer-Windows-sandbox.zip

      - name: Upload Windows Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AIPlayer-Windows-sandbox
          path: dist\windows\AIPlayer-Windows-sandbox.zip
